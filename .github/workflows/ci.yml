name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked
      - run: uv run llm-course course check --no-tests
      - run: uv run ruff check .
      - run: uv run pytest -q -m "not browser"

  browser:
    name: interactive browser
    runs-on: ubuntu-latest
    env:
      RUN_BROWSER_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --group webqa
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest -q -m browser
