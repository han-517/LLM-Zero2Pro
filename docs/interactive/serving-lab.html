<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>推理服务互动实验</title><link rel="stylesheet" href="labs.css"></head>
<body><main><nav><a href="index.html">← 互动地图</a><a href="../stages/09_inference.md">推理讲义</a></nav><h1>连续批处理、Paged KV 与推测解码</h1>
<div class="grid"><section class="panel"><h2>逻辑块 → 物理页</h2><div class="controls"><label class="control">Page size = <output id="page-v">4</output> tokens<input id="page-size" type="range" min="2" max="8" value="4"></label><label class="control">序列长度 = <output id="len-v">11</output><input id="length" type="range" min="1" max="24" value="11"></label></div><div id="pages" aria-live="polite"></div><p id="frag" class="metric"></p><p class="muted">共享前缀增加 refcount；写入共享的 partial page 时触发 copy-on-write。</p></section>
<section class="panel"><h2>随机推测解码</h2><div class="controls"><label class="control">Draft 接受率 = <output id="accept-v">70%</output><input id="accept" type="range" min="10" max="100" value="70"></label><label class="control">Draft block = <output id="draft-v">4</output><input id="draft" type="range" min="1" max="8" value="4"></label></div><div id="spec" class="tokens" aria-live="polite"></div><p id="speed" class="metric"></p><p class="muted">拒绝时从 (p−q)₊ 残差分布采样；全部接受时 target 还提供 bonus token。</p></section></div>
<section class="panel" style="margin-top:16px"><h2>服务指标包含排队时间</h2><div class="controls"><label class="control">并发请求 = <output id="req-v">6</output><input id="requests" type="range" min="1" max="16" value="6"></label></div><svg id="timeline" viewBox="0 0 760 220" role="img" aria-label="请求到达、首 token 和生成完成的连续批处理时间线"></svg><p id="metrics" aria-live="polite"></p></section>
</main><script>
const $=id=>document.getElementById(id);
function pages(){const p=+$("page-size").value,n=+$("length").value,count=Math.ceil(n/p),unused=count*p-n;$("page-v").value=p;$("len-v").value=n;$("pages").innerHTML=Array.from({length:count},(_,i)=>'<span class="page">P'+i+'<small>'+(i===count-1?p-unused:p)+'/'+p+'</small></span>').join('<span class="arrow">→</span>');$("frag").textContent="物理页 "+count+" · 内部碎片 "+unused+" token slots"}
$("page-size").addEventListener("input",pages);$("length").addEventListener("input",pages);pages();
function spec(){const a=+$("accept").value/100,k=+$("draft").value;$("accept-v").value=Math.round(a*100)+"%";$("draft-v").value=k;$("spec").innerHTML=Array.from({length:k},(_,i)=>'<span class="token '+(i<Math.round(k*a)?"accepted":"rejected")+'">'+(i<Math.round(k*a)?"✓ 接受":"✕ 残差修正")+'</span>').join("");$("speed").textContent="每次 target 调用期望推进约 "+(k*a+1).toFixed(1)+" token（教学估算）"}
$("accept").addEventListener("input",spec);$("draft").addEventListener("input",spec);spec();
function timeline(){const n=+$("requests").value;$("req-v").value=n;let svg='<line x1="80" y1="195" x2="730" y2="195" class="axis"/>';for(let i=0;i<n;i++){const y=20+i*(155/Math.max(1,n-1)),start=90+i*22,first=start+35+(i%3)*9,end=first+70+(i%4)*13;svg+='<text x="8" y="'+(y+5)+'" class="label">R'+(i+1)+'</text><line x1="'+start+'" y1="'+y+'" x2="'+first+'" y2="'+y+'" class="series-b"/><line x1="'+first+'" y1="'+y+'" x2="'+end+'" y2="'+y+'" class="series-a"/><circle cx="'+first+'" cy="'+y+'" r="4" class="fill-b"/><circle cx="'+end+'" cy="'+y+'" r="4" class="fill-a"/>'}$("timeline").innerHTML=svg;$("metrics").textContent="红段：arrival→first token（TTFT，含排队） · 蓝段：逐 token 生成（TPOT）。吞吐提高不保证单请求延迟下降。"}
$("requests").addEventListener("input",timeline);timeline();
</script></body></html>
