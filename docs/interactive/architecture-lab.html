<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RoPE 与注意力拓扑</title><link rel="stylesheet" href="labs.css"></head>
<body><main><nav><a href="index.html">← 互动地图</a><a href="../stages/04_modern_decoder.md">现代 Decoder 讲义</a><a href="../stages/06_attention_frontiers.md">前沿讲义</a></nav><h1>RoPE、Head 拓扑与缓存</h1>
<div class="grid"><section class="panel"><h2>RoPE 在 Q/K 内部旋转</h2><div class="controls"><label class="control">相对位移 Δ = <output id="delta-v">3</output><input id="delta" type="range" min="0" max="12" value="3"></label><label class="control">旋转比例 = <output id="fraction-v">100%</output><input id="fraction" type="range" min="25" max="100" step="25" value="100"></label></div><svg id="rope" viewBox="0 0 420 260" role="img" aria-label="RoPE 单位圆中 Q 与 K 的相对旋转"></svg><p id="rope-note" class="metric"></p></section>
<section class="panel"><h2>MHA / MQA / GQA / MLA / Linear state</h2><div class="controls"><label class="control">拓扑<select id="topology"><option>MHA</option><option>MQA</option><option selected>GQA</option><option>MLA baseline</option><option>Linear state</option></select></label><label class="control">序列长度 = <output id="seq-v">4096</output><input id="seq" type="range" min="512" max="16384" step="512" value="4096"></label></div><div id="heads" class="stage" aria-live="polite"></div><p id="cache" class="metric"></p><p id="boundary" class="muted"></p></section></div>
<section class="panel" style="margin-top:16px"><h2>滑窗感受野随层数扩张</h2><div class="controls"><label class="control">窗口 = <output id="win-v">4</output><input id="win" type="range" min="2" max="8" value="4"></label><label class="control">层数 = <output id="layers-v">3</output><input id="layers" type="range" min="1" max="8" value="3"></label></div><div class="bar"><span id="reach"></span></div><p id="reach-note" aria-live="polite"></p></section>
</main><script>
const $=id=>document.getElementById(id);
function rope(){const d=+$("delta").value,f=+$("fraction").value/100,a=d*.42,cs=Math.cos(a),sn=Math.sin(a),cx=130,cy=130,r=88;$("delta-v").value=d;$("fraction-v").value=Math.round(f*100)+"%";$("rope").innerHTML='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" class="fill-soft"/><line x1="35" y1="130" x2="225" y2="130" class="axis"/><line x1="130" y1="35" x2="130" y2="225" class="axis"/><line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r)+'" y2="'+cy+'" class="series-a"/><circle cx="'+(cx+r)+'" cy="'+cy+'" r="5" class="fill-a"/><line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*cs)+'" y2="'+(cy-r*sn)+'" class="series-b"/><circle cx="'+(cx+r*cs)+'" cy="'+(cy-r*sn)+'" r="5" class="fill-b"/><text x="240" y="100" class="label">Q：位置 i</text><text x="240" y="130" class="label">K：位置 j=i+Δ</text><text x="240" y="160" class="label">只旋转前 '+Math.round(f*100)+'% head dim</text><text x="240" y="190" class="label">RoPE 不是独立网络层</text>';$("rope-note").textContent="二维频带点积因子 cos(Δθ) = "+Math.cos(a).toFixed(3)}
$("delta").addEventListener("input",rope);$("fraction").addEventListener("input",rope);rope();
function topology(){const m=$("topology").value,s=+$("seq").value;$("seq-v").value=s;const q=8,kv=m==="MHA"?8:m==="MQA"?1:m==="GQA"?2:m==="MLA baseline"?1:0;let html='<div class="flow"><span class="node">Q heads ×'+q+'</span><span class="arrow">→</span>';if(m==="Linear state")html+='<span class="node">固定矩阵状态 S,z</span>';else if(m==="MLA baseline")html+='<span class="node">latent cₜ ×1</span><span class="arrow">→ 历史重建 K/V</span>';else html+='<span class="node">KV heads ×'+kv+'</span>';html+='</div>';$("heads").innerHTML=html;const bytes=m==="Linear state"?8*64*64*2:m==="MLA baseline"?s*64*2:s*kv*64*2*2;$("cache").textContent="教学估算缓存："+(bytes/1024/1024).toFixed(2)+" MiB / batch";$("boundary").textContent=m==="MLA baseline"?"这是 latent-cache reconstruction baseline，不等于投影吸收后的生产 decode。":m==="Linear state"?"状态大小与序列长度无关，但它不等于 Softmax attention。":"K/V 缓存随序列长度线性增长。"}
$("topology").addEventListener("change",topology);$("seq").addEventListener("input",topology);topology();
function reach(){const w=+$("win").value,l=+$("layers").value,r=Math.min(100,100*(1+l*(w-1))/64);$("win-v").value=w;$("layers-v").value=l;$("reach").style.width=r+"%";$("reach-note").textContent="64-token 序列中，末端 token 最多通过 "+l+" 层回看约 "+Math.min(64,1+l*(w-1))+" 个位置；固定窗口并不自动解决任意长检索。"}
$("win").addEventListener("input",reach);$("layers").addEventListener("input",reach);reach();
</script></body></html>
