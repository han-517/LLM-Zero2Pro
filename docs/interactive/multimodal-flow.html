<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>多模态数据流选修</title><link rel="stylesheet" href="labs.css"></head>
<body><main><nav><a href="index.html">← 互动地图</a><a href="../extensions/multimodal.md">选修讲义</a><a href="../../notebooks/80_multimodal_bridge.ipynb">CPU Notebook</a></nav><h1>图像如何接入文本 Decoder</h1>
<section class="panel"><div class="controls"><label class="control">每边 patch 数 = <output id="grid-v">4</output><input id="grid-size" type="range" min="2" max="8" value="4"></label><label class="control">接口<select id="interface"><option>Projector + token prefix</option><option>Cross-attention / resampler</option><option>原生交错 token</option></select></label></div>
<div class="grid"><div><h2>1 · patchify</h2><div id="patches" class="patches" role="img" aria-label="图像 patch 网格"></div></div><div><h2>2 · 视觉 token 到文本维度</h2><div id="flow" class="flow" aria-live="polite"></div><p id="shape" class="metric" aria-live="polite"></p><p id="note" class="muted"></p></div></div></section>
<section class="panel" style="margin-top:16px"><h2>位置与评测边界</h2><div class="flow"><span class="node">2D 视觉位置 / M-RoPE</span><span class="arrow">→</span><span class="node">模态配对与长度不平衡</span><span class="arrow">→</span><span class="node">视觉幻觉与 grounded 评测</span></div><p class="muted">这是 48 周文本主线之外的选修；不下载模型权重，也不训练大型 VLM。</p></section>
</main><script>
const $=id=>document.getElementById(id);
function draw(){const n=+$("grid-size").value,m=$("interface").value;$("grid-v").value=n;$("patches").style.gridTemplateColumns="repeat("+n+",1fr)";$("patches").innerHTML=Array.from({length:n*n},(_,i)=>'<span class="patch">'+i+'</span>').join("");const nodes=m.startsWith("Projector")?["patch embedding","Linear projector","文本 d_model","Decoder prefix"]:m.startsWith("Cross")?["patch embedding","resampler queries","cross-attention","文本 Decoder"]:["vision token","shared vocabulary/embedding","交错序列","统一 Decoder"];$("flow").innerHTML=nodes.map((x,i)=>'<span class="node">'+x+'</span>'+(i<nodes.length-1?'<span class="arrow">→</span>':'')).join("");$("shape").textContent="[B, 3, H, W] → [B, "+(n*n)+", P²·3] → [B, "+(n*n)+", d_model]";$("note").textContent=m.startsWith("Projector")?"最小 CPU 实验使用这条路径。":m.startsWith("Cross")?"resampler 可压缩视觉 token，但引入独立跨注意力接口。":"原生交错需要统一处理模态位置、数据平衡和 attention mask。"}
$("grid-size").addEventListener("input",draw);$("interface").addEventListener("change",draw);draw();
</script></body></html>
