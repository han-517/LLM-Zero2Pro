<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数据、训练与后训练</title><link rel="stylesheet" href="labs.css"></head>
<body><main><nav><a href="index.html">← 互动地图</a><a href="../stages/05_pretraining.md">预训练讲义</a><a href="../stages/08_posttraining.md">后训练讲义</a></nav><h1>数据、内存、Scaling 与目标函数</h1>
<div class="grid"><section class="panel"><h2>数据过滤漏斗</h2><div class="controls"><label class="control">重复率 <output id="dup-v">20%</output><input id="dup" type="range" min="0" max="60" value="20"></label><label class="control">质量过滤 <output id="quality-v">15%</output><input id="quality" type="range" min="0" max="60" value="15"></label></div><div class="bar"><span id="data-bar"></span></div><p id="data-note" class="metric" aria-live="polite"></p><p class="muted">每一步都要记录保留率、误删抽检、许可与评测污染；“更多”不自动等于“更好”。</p></section>
<section class="panel"><h2>每设备训练内存</h2><div class="controls"><label class="control">分片策略<select id="shard"><option>DDP</option><option>ZeRO-1</option><option>ZeRO-2</option><option>ZeRO-3 / FSDP</option></select></label><label class="control">设备数 <output id="world-v">8</output><input id="world" type="range" min="1" max="16" value="8"></label></div><table><thead><tr><th>组件</th><th>GiB / device</th></tr></thead><tbody id="memory" aria-live="polite"></tbody></table></section></div>
<section class="panel" style="margin-top:16px"><h2>SFT / DPO / GRPO：监督信号落在哪里</h2><div class="controls"><label class="control">目标<select id="objective"><option>SFT</option><option>DPO</option><option>GRPO / RLVR</option></select></label></div><div id="objective-flow" class="flow" aria-live="polite"></div><p id="objective-note" class="muted"></p></section>
</main><script>
const $=id=>document.getElementById(id);
function funnel(){const d=+$("dup").value,q=+$("quality").value,keep=(1-d/100)*(1-q/100);$("dup-v").value=d+"%";$("quality-v").value=q+"%";$("data-bar").style.width=100*keep+"%";$("data-note").textContent="100 万文档 → "+Math.round(1e6*keep).toLocaleString()+" 保留"}
$("dup").addEventListener("input",funnel);$("quality").addEventListener("input",funnel);funnel();
function memory(){const mode=$("shard").value,w=+$("world").value;$("world-v").value=w;const base={参数:14,梯度:14,优化器:56,激活:10},div={参数:mode.includes("3")?w:1,梯度:(mode.includes("2")||mode.includes("3"))?w:1,优化器:mode==="DDP"?1:w,激活:1};$("memory").innerHTML=Object.entries(base).map(([k,v])=>'<tr><td>'+k+'</td><td>'+(v/div[k]).toFixed(2)+'</td></tr>').join("")}
$("shard").addEventListener("change",memory);$("world").addEventListener("input",memory);memory();
function objective(){const m=$("objective").value;if(m==="SFT"){$("objective-flow").innerHTML='<span class="token">prompt（mask=0）</span><span class="arrow">→</span><span class="token accepted">response next-token（mask=1）</span>';$("objective-note").textContent="只对回答 token 计算交叉熵；shift、padding 与 chat template 必须对齐。"}else if(m==="DPO"){$("objective-flow").innerHTML='<span class="token accepted">chosen log π/πref</span><span class="arrow">对比</span><span class="token rejected">rejected log π/πref</span>';$("objective-note").textContent="输入是完整 response 的 sequence log-prob；长度与 mask 契约必须显式。"}else{$("objective-flow").innerHTML='<span class="token">同一 prompt 的 G 个回答</span><span class="arrow">→ verifier</span><span class="token accepted">组内相对优势</span>';$("objective-note").textContent="课程函数只是 toy objective；真实 RLVR 还需采样、KL、更新策略、奖励防作弊和安全评测。"}}
$("objective").addEventListener("change",objective);objective();
</script></body></html>
