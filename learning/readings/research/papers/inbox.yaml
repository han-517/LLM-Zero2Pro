  title: Rethinking the Evaluation of Harness Evolution for Agents
  authors:
  - Yike Wang
  - Huaisheng Zhu
  - Zhengyu Hu
  - Yige Yuan
  - Zhengyu Chen
  - Shakti Senthil
  - Hannaneh Hajishirzi
  - Yulia Tsvetkov
  - Pradeep Dasigi
