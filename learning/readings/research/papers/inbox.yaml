  title: Hierarchical Denoising For Multi-Step Visual Reasoning
  authors:
  - Zezhong Qian
  - Xiaowei Chi
  - Chak-Wing Mak
  - Tianze Zhou
  - Ruibin Yuan
  - Yuhan Rui
  - Hengzhe Sun
  - Zhuoqun Wu
