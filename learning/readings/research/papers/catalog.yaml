metadata:
  title: 文本 LLM 论文目录
  as_of: '2026-07-19'
  count: 96
  policy: Core 约 25 篇；Deep Dive 保持 40–60 篇；新论文先进入 inbox，人工核验后再升级。
papers:
- id: bengio_nplm
  title: A Neural Probabilistic Language Model
  year: 2003
  version_date: '2003-03-01'
  source_type: peer_reviewed
  url: https://www.jmlr.org/papers/v3/bengio03a.html
  code_url: ''
  topics:
  - language-modeling
  - embeddings
  - foundations
  tier: core
  status: unread
  prerequisites:
  - probability
  - mlp
  - cross-entropy
  claims:
  - 分布式词表示与神经网络可缓解离散 n-gram 的泛化问题。
  evidence:
  - 在当时的语言建模数据上比较神经模型与 n-gram。
  limitations:
  - 上下文窗口固定，规模和数据远小于现代 LLM。
  reproduction: planned-small
  relations: []
  as_of: '2026-07-19'
  doi: 10.1162/153244303322533223
- id: seq2seq
  title: Sequence to Sequence Learning with Neural Networks
  year: 2014
  version_date: '2014-09-10'
  source_type: peer_reviewed
  url: https://arxiv.org/abs/1409.3215
  code_url: ''
  topics:
  - sequence-modeling
  - rnn
  - translation
  tier: core
  status: unread
  prerequisites:
  - rnn
  - backpropagation
  claims:
  - 端到端编码器—解码器可直接学习序列映射。
  evidence:
  - 机器翻译实验展示深层 LSTM 序列模型的可行性。
  limitations:
  - 固定长度瓶颈和串行计算限制长序列。
  reproduction: conceptual
  relations:
  - type: builds_on
    target: bengio_nplm
  as_of: '2026-07-19'
- id: bahdanau_attention
  title: Neural Machine Translation by Jointly Learning to Align and Translate
  year: 2015
  version_date: '2014-09-01'
  source_type: peer_reviewed
  url: https://arxiv.org/abs/1409.0473
  code_url: ''
  topics:
  - attention
  - translation
  - rnn
  tier: core
  status: unread
  prerequisites:
  - seq2seq
  - softmax
  claims:
  - 软注意力允许解码器动态读取不同源位置，减轻固定向量瓶颈。
  evidence:
  - 翻译质量和对齐可视化优于固定上下文编码器。
  limitations:
  - 仍依赖 RNN 的串行状态更新。
  reproduction: planned-small
  relations:
  - type: improves
    target: seq2seq
  as_of: '2026-07-19'
- id: transformer
  title: Attention Is All You Need
  year: 2017
  version_date: '2017-06-12'
  source_type: peer_reviewed
  url: https://arxiv.org/abs/1706.03762
  code_url: https://github.com/tensorflow/tensor2tensor
  topics:
  - transformer
  - attention
  - architecture
  tier: core
  status: unread
  prerequisites:
  - attention
  - matrix-multiplication
  - softmax
  claims:
  - 纯注意力架构可移除序列递归，并提高训练并行性。
  evidence:
  - 机器翻译任务上的质量、训练成本与消融实验。
  limitations:
  - 原始架构的注意力随序列长度二次增长，规模与现代 LLM 有差距。
  reproduction: required
  relations:
  - type: improves
    target: bahdanau_attention
  as_of: '2026-07-19'
- id: gpt2
  title: Language Models are Unsupervised Multitask Learners
  year: 2019
  version_date: '2019-02-14'
  source_type: technical_report
  url: https://cdn.openai.com/better-language-models/language_models_are_unsupervised_multitask_learners.pdf
  code_url: https://github.com/openai/gpt-2
  topics:
  - decoder-only
  - pretraining
  - zero-shot
  tier: core
  status: unread
  prerequisites:
  - transformer
  - language-modeling
  claims:
  - 足够大且多样的自回归语言模型能以零样本方式执行多种任务。
  evidence:
  - 多个语言任务上的零样本评测与随规模变化的结果。
  limitations:
  - 技术报告而非标准同行评审论文，数据细节与现代标准不同。
