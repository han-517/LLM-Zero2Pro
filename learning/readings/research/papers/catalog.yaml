  - scaling-laws
  - pretraining
  - compute
  tier: core
  status: unread
  prerequisites:
  - regression
  - language-modeling
  - compute-accounting
  claims:
  - 交叉熵损失在一定范围内随模型、数据和计算呈幂律变化。
  evidence:
  - 大量不同规模训练实验与幂律拟合。
  limitations:
