<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>计算图与 Token 互动实验</title><link rel="stylesheet" href="labs.css"></head>
<body><main><nav><a href="index.html">← 互动地图</a><a href="../../learning/labs/starter/11_autograd.py">Starter 11</a><a href="../../learning/labs/starter/06_byte_bpe.py">Starter 06</a></nav><h1>计算图、BPE 与上下文</h1>
<div class="grid">
<section class="panel"><h2>分支梯度必须求和</h2><div class="controls"><label class="control">x = <output id="xv">2</output><input id="x" type="range" min="-3" max="3" step=".25" value="2"></label><label class="control">y = <output id="yv">-0.5</output><input id="y" type="range" min="-2" max="2" step=".25" value="-0.5"></label></div><div id="graph" class="stage" aria-live="polite"></div><p id="grads" class="metric"></p></section>
<section class="panel"><h2>Byte BPE merge 动画</h2><p class="small">初始 token 是 UTF-8 字节；每一步只合并当前最高频相邻对。</p><div id="tokens" class="tokens" aria-live="polite"></div><p id="merge" class="small"></p><button id="step" type="button">执行下一次 merge</button><button id="reset" type="button">重置</button></section>
</div>
<section class="panel" style="margin-top:16px"><h2>Bigram → MLP → RNN：上下文从哪里来</h2><div class="controls"><label class="control">模型<select id="model"><option>Bigram</option><option>MLP</option><option>RNN</option></select></label><label class="control">固定窗口 = <output id="windowv">3</output><input id="window" type="range" min="1" max="6" value="3"></label></div><div id="context" class="flow" aria-live="polite"></div><p id="context-note" class="muted"></p></section>
</main><script>
const $=id=>document.getElementById(id);
function graph(){const x=+$("x").value,y=+$("y").value,m=x*y,a=m+x,f=a*a,dx=2*a*(y+1),dy=2*a*x;$("xv").value=x;$("yv").value=y;$("graph").innerHTML='<div class="flow"><span class="node">x='+x.toFixed(2)+'</span><span class="arrow">↘</span><span class="node">m=x·y='+m.toFixed(2)+'</span><span class="arrow">↘</span><span class="node">a=m+x='+a.toFixed(2)+'</span><span class="arrow">→</span><span class="node">f=a²='+f.toFixed(2)+'</span></div><div class="flow" style="margin-top:12px"><span class="node">y='+y.toFixed(2)+'</span><span class="arrow">↗</span><span class="small">x 同时经过乘法支路与加法支路</span></div>';$("grads").textContent='∂f/∂x = '+dx.toFixed(3)+'（两支相加） · ∂f/∂y = '+dy.toFixed(3)}
$("x").addEventListener("input",graph);$("y").addEventListener("input",graph);graph();
const original=Array.from(new TextEncoder().encode("banana_bandana")),merges=[];let seq=[...original],next=256;
function drawTokens(note="尚未合并"){$("tokens").innerHTML=seq.map(t=>'<span class="token">'+(t<256?String.fromCharCode(t):"M"+t)+'</span>').join("");$("merge").textContent=note}
function mergeStep(){const counts=new Map;for(let i=0;i<seq.length-1;i++){const k=seq[i]+","+seq[i+1];counts.set(k,(counts.get(k)||0)+1)}if(!counts.size)return;const best=[...counts].sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]))[0],pair=best[0].split(",").map(Number),out=[];for(let i=0;i<seq.length;i++){if(i+1<seq.length&&seq[i]===pair[0]&&seq[i+1]===pair[1]){out.push(next);i++}else out.push(seq[i])}merges.push(pair);seq=out;drawTokens("合并 "+pair.join("+")+" → M"+next+"，出现 "+best[1]+" 次");next++}
$("step").addEventListener("click",mergeStep);$("reset").addEventListener("click",()=>{seq=[...original];next=256;merges.length=0;drawTokens()});drawTokens();
function context(){const mode=$("model").value,w=+$("window").value;$("windowv").value=w;const words=["大","模型","正在","预测","下","一个","词"],shown=mode==="Bigram"?words.slice(-1):mode==="MLP"?words.slice(-w):words;$("context").innerHTML=shown.map((t,i)=>'<span class="token">'+t+'</span>'+(i<shown.length-1?'<span class="arrow">→</span>':'')).join("")+(mode==="RNN"?'<span class="arrow">→</span><span class="node">hₜ 状态</span>':'');$("context-note").textContent=mode==="Bigram"?"只看前一个 token。":mode==="MLP"?"显式固定窗口，窗口外信息不可见。":"状态递归汇总历史，但训练串行且长依赖梯度困难。"}
$("model").addEventListener("change",context);$("window").addEventListener("input",context);context();
</script></body></html>
