  readings:
  - learning/readings/stages/03_transformer.md
  - learning/readings/lessons/14_transformer_block_and_residual.md
  experiments:
  - 无残差消融
  - 梯度范数记录
  exercise: 实现一个 Pre-Norm Block
  acceptance:
  - 端到端前反传
  - 参数量计算正确
  assets:
    lesson: learning/readings/lessons/14_transformer_block_and_residual.md
    lab:
      ipynb: learning/labs/05_tiny_gpt.ipynb
